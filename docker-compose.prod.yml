version: '3.8'

services:
  mini-erp-db:
    image: postgres:15-alpine
    container_name: mini-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_pass}
      POSTGRES_DB: ${DB_NAME:-mini_erp_export}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - mini-erp-network

  mini-erp-redis:
    image: redis:7-alpine
    container_name: mini-erp-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - mini-erp-network

  mini-erp-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mini-erp-backend
    restart: unless-stopped
    depends_on:
      - mini-erp-db
      - mini-erp-redis
    environment:
      - NODE_ENV=production
      - DB_HOST=mini-erp-db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-erp_user}
      - DB_PASSWORD=${DB_PASSWORD:-erp_pass}
      - DB_NAME=${DB_NAME:-mini_erp_export}
      - REDIS_HOST=mini-erp-redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_change_me_in_prod}
    volumes:
      - backend_uploads:/usr/src/app/uploads
    networks:
      - mini-erp-network

  mini-erp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mini-erp-frontend
    restart: unless-stopped
    depends_on:
      - mini-erp-backend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://api.minierp.com # Update with real domain later, or use localhost if not using domain
      - NEXTAUTH_URL=http://app.minierp.com # Update with real domain
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-super_secret_frontend_key_change_me}
    networks:
      - mini-erp-network

  mini-erp-nginx:
    image: nginx:alpine
    container_name: mini-erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mini-erp-frontend
      - mini-erp-backend
    networks:
      - mini-erp-network

networks:
  mini-erp-network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  backend_uploads:
