services:
  postgres:
    image: postgres:15
    container_name: mini-erp
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: mini_erp
    ports:
      - "5433:5432"
    volumes:
      - mini_erp_pg_data:/var/lib/postgresql/data

volumes:
  mini_erp_pg_data: