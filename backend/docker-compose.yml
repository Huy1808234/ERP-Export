services:
  postgres:
    image: postgres:15
    container_name: mini-erp
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
      POSTGRES_DB: mini_erp_export
    ports:
      - "5433:5432"
    volumes:
      - mini_erp_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mini-erp-redis
    ports:
      - "6380:6379"

volumes:
  mini_erp_pg_data: